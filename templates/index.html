<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Busca de Filmes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎬 Busca de Filmes</h1>
        <form method="GET" action="/">
            <input type="text" name="titulo" placeholder="Digite o nome do filme">
            <button type="submit">Buscar</button>
        </form>

        {% if filme %}
        <div class="resultado">
            <img src="{{ filme['Poster'] }}" alt="Pôster do filme">
            <h2>{{ filme['Title'] }} ({{ filme['Year'] }})</h2>
            <p>{{ filme['Plot'] }}</p>
            <p><strong>Nota IMDb:</strong> {{ filme['imdbRating'] }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
